<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dni bez awarii ekspresu</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=JetBrains+Mono:wght@500;700;800&family=Work+Sans:wght@400;500;600&display=swap');

:root{
  --espresso:#2B1810;--espresso-soft:#4A2F1F;
  --crema:#F4E8D8;--crema-deep:#EADCC6;
  --caramel:#C17F3E;--caramel-deep:#9E5F26;
  --rust:#8B4226;
  --steel:#2A2E35;--steel-soft:#3D424B;
  --amber:#E8A33D;
  --alert:#C44536;
  --paper:#FBF6EC;--ink:#241308;
  --shadow:0 18px 40px -16px rgba(43,24,16,0.45);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Work Sans',sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--crema);color:var(--ink);overflow-x:hidden;
}
.app{
  position:relative;width:100%;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:32px 18px;isolation:isolate;
}

/* backgrounds */
.bg-base{
  position:fixed;inset:0;z-index:-3;
  background:radial-gradient(ellipse at 20% -10%,var(--crema-deep),var(--crema) 55%);
  transition:background 0.8s;
}
.app[data-state="broken"] .bg-base{background:radial-gradient(ellipse at 20% -10%,var(--steel-soft),var(--steel) 60%);}
.bg-pattern{position:fixed;inset:0;z-index:-2;opacity:0.16;transition:opacity 0.6s;}
.bg-pattern svg{width:100%;height:100%;}
.bg-stripes{position:fixed;inset:0;z-index:-2;opacity:0;transition:opacity 0.6s;}
.app[data-state="broken"] .bg-stripes{opacity:0.14;}
.app[data-state="broken"] .bg-pattern{opacity:0;}
.bg-stripes .stripe-track{
  position:absolute;inset:-20% -20%;
  background:repeating-linear-gradient(45deg,var(--amber) 0 28px,var(--steel) 28px 56px);
  animation:slide-stripes 18s linear infinite;
}
@keyframes slide-stripes{from{transform:translate(0,0);}to{transform:translate(79px,79px);}}
.vignette{position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:radial-gradient(ellipse at 50% 100%,rgba(43,24,16,0.18),transparent 60%);}

/* card */
.card{
  position:relative;width:100%;max-width:560px;
  background:var(--paper);border-radius:28px;
  padding:clamp(28px,5vw,52px) clamp(22px,5vw,48px) clamp(30px,5vw,46px);
  box-shadow:var(--shadow);border:1px solid rgba(43,24,16,0.06);text-align:center;
}
.app[data-state="broken"] .card{box-shadow:0 18px 40px -16px rgba(0,0,0,0.55);}
.ring-stain{position:absolute;right:-22px;bottom:-26px;width:140px;height:140px;opacity:0.5;pointer-events:none;}
.app[data-state="broken"] .ring-stain{opacity:0.12;}

/* loading */
.loading-overlay{
  position:absolute;inset:0;background:var(--paper);border-radius:28px;
  display:flex;align-items:center;justify-content:center;z-index:10;
  transition:opacity 0.4s;
}
.loading-overlay.hidden{opacity:0;pointer-events:none;}
.spinner{
  width:36px;height:36px;border:3px solid rgba(43,24,16,0.12);
  border-top-color:var(--caramel);border-radius:50%;
  animation:spin-s 0.8s linear infinite;
}
@keyframes spin-s{to{transform:rotate(360deg);}}

/* icons */
.icon-wrap{width:84px;height:84px;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;}
.icon-wrap svg{width:100%;height:100%;overflow:visible;}
.steam-line{fill:none;stroke:var(--caramel-deep);stroke-width:3;stroke-linecap:round;opacity:0;animation:rise 3.2s ease-in-out infinite;}
.app[data-state="working"] .steam-line{opacity:0.55;}
.steam-line.s2{animation-delay:0.9s;}.steam-line.s3{animation-delay:1.8s;}
@keyframes rise{0%{opacity:0;transform:translateY(4px);}30%{opacity:0.6;}100%{opacity:0;transform:translateY(-14px);}}
.cup-body{fill:var(--espresso);}.cup-base{fill:var(--rust);}
.gear{transform-origin:50px 50px;}
.app[data-state="broken"] .gear{animation:spin-g 6s linear infinite;}
@keyframes spin-g{to{transform:rotate(360deg);}}
.gear-ring{fill:none;stroke:var(--amber);stroke-width:9;}
.gear-tooth{fill:var(--amber);}.gear-bolt{fill:var(--steel);}
.alert-dot{fill:var(--alert);}
.alert-pulse{animation:pulse 1.8s ease-in-out infinite;transform-origin:center;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.35;transform:scale(1.18);}}
.icon-coffee{display:block;}.icon-repair{display:none;}
.app[data-state="broken"] .icon-coffee{display:none;}
.app[data-state="broken"] .icon-repair{display:block;}

/* typography */
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.18em;font-weight:700;text-transform:uppercase;color:var(--caramel-deep);margin:2px 0 4px;}
.app[data-state="broken"] .eyebrow{color:var(--amber);}
.quip{font-size:13.5px;color:var(--espresso-soft);opacity:0.62;margin:0 0 22px;min-height:18px;}
.app[data-state="broken"] .quip{color:var(--crema-deep);opacity:0.75;}

/* flip counter */
.counter-row{display:flex;align-items:center;justify-content:center;gap:8px;margin:6px 0 14px;perspective:600px;flex-wrap:wrap;}
.flip-digit{
  position:relative;width:clamp(46px,12vw,64px);height:clamp(64px,16vw,88px);
  background:linear-gradient(180deg,#3a2516,var(--espresso) 52%,#1c0f08);
  border-radius:9px;box-shadow:0 6px 0 rgba(0,0,0,0.18),inset 0 1px 0 rgba(255,255,255,0.08);
}
.app[data-state="broken"] .flip-digit{background:linear-gradient(180deg,#4a4f59,var(--steel) 52%,#16181c);}
.flip-digit::after{content:"";position:absolute;left:0;right:0;top:50%;height:2px;background:rgba(0,0,0,0.45);transform:translateY(-1px);z-index:2;}
.flip-digit .face{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:800;font-size:clamp(30px,8vw,44px);color:var(--crema);backface-visibility:hidden;}
.flip-digit.flipping .face{animation:flipDigit 0.55s ease;}
@keyframes flipDigit{0%{transform:rotateX(0deg);}48%{transform:rotateX(-92deg);}52%{transform:rotateX(-92deg);}100%{transform:rotateX(0deg);}}
.counter-unit{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(17px,4vw,21px);margin-left:4px;color:var(--espresso);}
.app[data-state="broken"] .counter-unit{color:var(--crema);}
.counter-label{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(18px,3.6vw,22px);color:var(--espresso);margin:2px 0 18px;}
.app[data-state="broken"] .counter-label{color:var(--crema);}

/* meta */
.meta{display:flex;justify-content:center;gap:18px;flex-wrap:wrap;font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--espresso-soft);opacity:0.8;margin-bottom:26px;}
.app[data-state="broken"] .meta{color:var(--crema-deep);}
.meta b{font-weight:700;}

/* buttons */
.actions{display:flex;flex-direction:column;align-items:center;gap:10px;}
.btn{font-family:'Work Sans',sans-serif;font-weight:600;font-size:15px;border:none;border-radius:999px;padding:14px 30px;cursor:pointer;display:inline-flex;align-items:center;gap:9px;transition:transform 0.15s,background 0.3s;box-shadow:0 10px 20px -8px rgba(43,24,16,0.4);}
.btn:active{transform:translateY(1px) scale(0.98);}
.btn-report{background:var(--alert);color:var(--paper);}
.btn-report:hover{background:#a83a2d;}
.btn-fixed{background:var(--caramel);color:var(--paper);}
.btn-fixed:hover{background:var(--caramel-deep);}
.btn.armed{background:var(--ink);}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.link-btn{background:none;border:none;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--espresso-soft);opacity:0.65;text-decoration:underline;padding:6px;}
.app[data-state="broken"] .link-btn{color:var(--crema-deep);}

/* settings */
.settings{margin-top:16px;text-align:left;background:rgba(43,24,16,0.04);border-radius:14px;padding:16px 18px;display:none;}
.settings.open{display:block;}
.settings label{display:block;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.05em;text-transform:uppercase;opacity:0.6;margin-bottom:5px;}
.settings input[type="date"]{font-family:'Work Sans',sans-serif;font-size:14px;padding:8px 10px;border-radius:8px;border:1px solid rgba(43,24,16,0.18);width:100%;margin-bottom:12px;background:#fff;}
.settings .save-btn{background:var(--ink);color:var(--paper);border:none;border-radius:8px;padding:9px 16px;font-weight:600;font-size:13px;cursor:pointer;}

/* history */
.history{margin-top:18px;text-align:left;}
.history-list{list-style:none;margin:10px 0 0;padding:0;display:flex;flex-direction:column;gap:8px;max-height:220px;overflow-y:auto;}
.history-list li{font-size:13px;background:rgba(43,24,16,0.04);border-radius:10px;padding:9px 12px;display:flex;justify-content:space-between;gap:10px;}
.app[data-state="broken"] .history-list li{background:rgba(255,255,255,0.06);color:var(--crema);}
.history-empty{font-size:13px;opacity:0.6;padding:8px 2px;}
.badge{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:11px;background:var(--caramel);color:var(--paper);border-radius:6px;padding:2px 7px;}

/* banners */
.offline-banner{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--alert);color:#fff;text-align:center;padding:7px;border-radius:10px;margin-bottom:16px;display:none;}
.offline-banner.show{display:block;}

footer.credit{margin-top:22px;font-size:11px;opacity:0.4;font-family:'JetBrains Mono',monospace;}

@media(prefers-reduced-motion:reduce){.steam-line,.gear,.alert-pulse,.stripe-track,.flip-digit.flipping .face,.spinner{animation:none!important;}}
</style>
</head>
<body>

<div class="bg-base"></div>
<div class="bg-pattern" aria-hidden="true">
  <svg xmlns="http://www.w3.org/2000/svg">
    <defs>
      <pattern id="beans" width="120" height="120" patternUnits="userSpaceOnUse" patternTransform="rotate(12)">
        <g fill="#8B4226">
          <g transform="translate(15,20)">
            <ellipse cx="0" cy="0" rx="14" ry="20" transform="rotate(18)"/>
            <path d="M0,-18 C2,-8 2,8 0,18" stroke="#F4E8D8" stroke-width="2" fill="none" transform="rotate(18)"/>
          </g>
          <g transform="translate(75,65)">
            <ellipse cx="0" cy="0" rx="12" ry="17" transform="rotate(-25)"/>
            <path d="M0,-15 C2,-7 2,7 0,15" stroke="#F4E8D8" stroke-width="2" fill="none" transform="rotate(-25)"/>
          </g>
          <g transform="translate(45,100)">
            <ellipse cx="0" cy="0" rx="10" ry="14" transform="rotate(60)"/>
            <path d="M0,-12 C2,-6 2,6 0,12" stroke="#F4E8D8" stroke-width="2" fill="none" transform="rotate(60)"/>
          </g>
        </g>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#beans)"/>
  </svg>
</div>
<div class="bg-stripes" aria-hidden="true"><div class="stripe-track"></div></div>
<div class="vignette"></div>

<div class="app" data-state="working" id="app">
  <div class="card">
    <svg class="ring-stain" viewBox="0 0 140 140" aria-hidden="true">
      <circle cx="70" cy="70" r="55" fill="none" stroke="#8B4226" stroke-width="6"/>
      <circle cx="70" cy="70" r="40" fill="none" stroke="#8B4226" stroke-width="3" opacity="0.6"/>
    </svg>

    <div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
    <div class="offline-banner" id="offlineBanner">Brak połączenia z bazą — zmiany nie zapiszą się dla reszty biura</div>

    <div class="icon-wrap">
      <svg class="icon-coffee" viewBox="0 0 100 90">
        <path class="steam-line s1" d="M38,40 C30,30 46,24 40,12"/>
        <path class="steam-line s2" d="M50,40 C42,30 58,24 52,12"/>
        <path class="steam-line s3" d="M62,40 C54,30 70,24 64,12"/>
        <path class="cup-body" d="M22,42 h44 v22 a22,22 0 0 1 -22,22 h0 a22,22 0 0 1 -22,-22 z"/>
        <path class="cup-base" d="M30,86 h24 l-3,4 h-18 z"/>
        <path fill="none" stroke="#C17F3E" stroke-width="6" d="M66,48 q16,0 16,14 q0,14 -16,14"/>
      </svg>
      <svg class="icon-repair" viewBox="0 0 100 100">
        <g class="gear">
          <circle class="gear-ring" cx="50" cy="50" r="24"/>
          <g class="gear-tooth">
            <rect x="44" y="6"  width="12" height="16" rx="2"/>
            <rect x="44" y="78" width="12" height="16" rx="2"/>
            <rect x="6"  y="44" width="16" height="12" rx="2"/>
            <rect x="78" y="44" width="16" height="12" rx="2"/>
            <rect x="44" y="6"  width="12" height="16" rx="2" transform="rotate(45 50 50)"/>
            <rect x="44" y="78" width="12" height="16" rx="2" transform="rotate(45 50 50)"/>
            <rect x="6"  y="44" width="16" height="12" rx="2" transform="rotate(45 50 50)"/>
            <rect x="78" y="44" width="16" height="12" rx="2" transform="rotate(45 50 50)"/>
          </g>
          <circle class="gear-bolt" cx="50" cy="50" r="9"/>
        </g>
        <circle class="alert-dot alert-pulse" cx="82" cy="20" r="7"/>
      </svg>
    </div>

    <div class="eyebrow"   id="eyebrow">Tablica biurowa</div>
    <div class="quip"      id="quip"></div>
    <div class="counter-row" id="counterRow"></div>
    <div class="counter-label" id="counterLabel">dni bez awarii</div>
    <div class="meta"      id="meta"></div>
    <div class="actions"   id="actions"></div>

    <button class="link-btn" id="settingsToggle" type="button">Popraw datę ręcznie</button>
    <div class="settings" id="settings">
      <div id="settingsFields"></div>
      <button class="save-btn" id="settingsSave" type="button">Zapisz</button>
    </div>

    <div class="history">
      <button class="link-btn" id="historyToggle" type="button">Historia awarii</button>
      <ul class="history-list" id="historyList" style="display:none;"></ul>
    </div>

    <footer class="credit">licznik biurowy · dane: Firebase</footer>
  </div>
</div>

<script>
(function () {
  /* ── Firebase config ─────────────────────────────────────── */
  const DB_URL     = 'https://kawa-d3431-default-rtdb.europe-west1.firebasedatabase.app';
  const STATE_NODE = '/coffee-state.json';
  /* ─────────────────────────────────────────────────────────── */

  const DAY = 86400000;
  const WORKING_QUIPS = [
    'Na razie trzyma się dzielnie.',
    'Każdy dzień to mały cud.',
    'Cisza w temacie. Oby tak zostało.',
    'Ekspres jeszcze daje radę.'
  ];
  const BROKEN_QUIPS = [
    'Ekspres robi sobie przerwę.',
    'Kawa? Może następnym razem.',
    'Serwisant w drodze, oby.',
    'Tymczasowo bez kofeiny.',
    'Strajk generalny.'
  ];

  let state       = null;
  let offline     = false;
  let prevDigits  = [];
  const quipMemo  = {};

  const el = {
    app:            document.getElementById('app'),
    loadingOverlay: document.getElementById('loadingOverlay'),
    offlineBanner:  document.getElementById('offlineBanner'),
    eyebrow:        document.getElementById('eyebrow'),
    quip:           document.getElementById('quip'),
    counterRow:     document.getElementById('counterRow'),
    counterLabel:   document.getElementById('counterLabel'),
    meta:           document.getElementById('meta'),
    actions:        document.getElementById('actions'),
    settingsToggle: document.getElementById('settingsToggle'),
    settings:       document.getElementById('settings'),
    settingsFields: document.getElementById('settingsFields'),
    settingsSave:   document.getElementById('settingsSave'),
    historyToggle:  document.getElementById('historyToggle'),
    historyList:    document.getElementById('historyList'),
  };

  /* ── Firebase REST ─────────────────────────────────────────── */
  async function fbGet() {
    const res = await fetch(DB_URL + STATE_NODE);
    if (!res.ok) throw new Error('GET ' + res.status);
    return res.json(); // null when node doesn't exist yet
  }

  async function fbPut(data) {
    const res = await fetch(DB_URL + STATE_NODE, {
      method:  'PUT',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(data),
    });
    if (!res.ok) throw new Error('PUT ' + res.status);
  }

  /* ── Helpers ───────────────────────────────────────────────── */
  const todayISO = () => new Date().toISOString().slice(0, 10);

  const defaultState = () => ({
    status: 'working', counterStart: todayISO(),
    brokenSince: null, record: 0, history: [],
  });

  function fmtDate(iso) {
    if (!iso) return '—';
    return new Date(iso + 'T00:00:00')
      .toLocaleDateString('pl-PL', { day: '2-digit', month: '2-digit', year: 'numeric' });
  }

  function daysBetween(a, b) {
    return Math.max(0, Math.round(
      (new Date(b + 'T00:00:00') - new Date(a + 'T00:00:00')) / DAY
    ));
  }

  /* ── State load / save ─────────────────────────────────────── */
  async function loadState() {
    try {
      const remote = await fbGet();
      state = remote ?? defaultState();
      if (!remote) await fbPut(state);
      offline = false;
    } catch (e) {
      state   = defaultState();
      offline = true;
    }
    el.offlineBanner.classList.toggle('show', offline);
    el.loadingOverlay.classList.add('hidden');
    render();
  }

  async function saveState() {
    try   { await fbPut(state); offline = false; }
    catch { offline = true; }
    el.offlineBanner.classList.toggle('show', offline);
  }

  /* ── Poll every 20 s for remote changes ────────────────────── */
  async function poll() {
    try {
      const remote = await fbGet();
      if (remote && JSON.stringify(remote) !== JSON.stringify(state)) {
        state = remote;
        render();
      }
      if (offline) { offline = false; el.offlineBanner.classList.remove('show'); }
    } catch { /* keep last known */ }
  }

  /* ── Render ─────────────────────────────────────────────────── */
  function currentCount() {
    const t = todayISO();
    return state.status === 'working'
      ? daysBetween(state.counterStart, t)
      : daysBetween(state.brokenSince,  t);
  }

  function renderDigits(digits) {
    if (prevDigits.length !== digits.length) {
      el.counterRow.innerHTML = '';
      prevDigits = digits.map(() => null);
    }
    digits.forEach((d, i) => {
      let chip = el.counterRow.children[i];
      if (!chip) {
        chip = document.createElement('div');
        chip.className = 'flip-digit';
        const face = document.createElement('div');
        face.className = 'face';
        chip.appendChild(face);
        el.counterRow.appendChild(chip);
      }
      const face = chip.querySelector('.face');
      if (prevDigits[i] !== d) {
        if (prevDigits[i] !== null) {
          chip.classList.remove('flipping');
          void chip.offsetWidth;
          chip.classList.add('flipping');
          setTimeout(() => { face.textContent = d; }, 260);
        } else {
          face.textContent = d;
        }
      }
      prevDigits[i] = d;
    });
    if (!el.counterRow.querySelector('.counter-unit')) {
      const u = document.createElement('div');
      u.className = 'counter-unit';
      u.textContent = 'DNI';
      el.counterRow.appendChild(u);
    }
  }

  function render() {
    if (!state) return;
    const ok = state.status === 'working';
    el.app.dataset.state = ok ? 'working' : 'broken';
    el.eyebrow.textContent = ok ? 'Tablica biurowa' : 'Awaria zgłoszona';

    const qk = ok ? 'w' : 'b';
    if (!(qk in quipMemo)) {
      const arr = ok ? WORKING_QUIPS : BROKEN_QUIPS;
      quipMemo[qk] = Math.floor(Math.random() * arr.length);
    }
    el.quip.textContent = (ok ? WORKING_QUIPS : BROKEN_QUIPS)[quipMemo[qk]];

    renderDigits(String(currentCount()).padStart(2, '0').split(''));
    el.counterLabel.textContent = ok ? 'dni bez awarii ekspresu' : 'dni w naprawie';

    el.meta.innerHTML = '';
    const a = document.createElement('span');
    const b = document.createElement('span');
    if (ok) {
      a.innerHTML = 'rekord: <b>' + (state.record || 0) + ' dni</b>';
      b.innerHTML = 'licznik od: <b>' + fmtDate(state.counterStart) + '</b>';
    } else {
      a.innerHTML = 'zepsuty od: <b>' + fmtDate(state.brokenSince) + '</b>';
      b.innerHTML = 'najlepsza seria: <b>' + (state.record || 0) + ' dni</b>';
    }
    el.meta.appendChild(a);
    el.meta.appendChild(b);

    renderActions(ok);
    renderSettingsFields(ok);
    renderHistory();
  }

  function renderActions(isWorking) {
    el.actions.innerHTML = '';
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.dataset.armed = 'false';
    btn.className = isWorking ? 'btn btn-report' : 'btn btn-fixed';
    btn.innerHTML   = isWorking ? '☕ Zgłoś awarię' : '🔧 Ekspres naprawiony';
    const base = btn.innerHTML;
    let timer = null;
    btn.addEventListener('click', () => {
      if (btn.dataset.armed === 'false') {
        btn.dataset.armed = 'true';
        btn.classList.add('armed');
        btn.textContent = 'Na pewno? Kliknij ponownie';
        timer = setTimeout(() => {
          btn.dataset.armed = 'false';
          btn.classList.remove('armed');
          btn.innerHTML = base;
        }, 4000);
      } else {
        clearTimeout(timer);
        btn.dataset.armed = 'false';
        btn.disabled = true;
        isWorking ? reportFailure() : markFixed();
      }
    });
    el.actions.appendChild(btn);
  }

  async function reportFailure() {
    const today = todayISO();
    state.record       = Math.max(state.record || 0, daysBetween(state.counterStart, today));
    state._lastStreak  = daysBetween(state.counterStart, today);
    state.status       = 'broken';
    state.brokenSince  = today;
    await saveState();
    render();
  }

  async function markFixed() {
    const today      = todayISO();
    const repairDays = daysBetween(state.brokenSince, today);
    state.history    = (state.history || []);
    state.history.unshift({
      brokenAt: state.brokenSince, fixedAt: today,
      repairDays, streakBefore: state._lastStreak ?? null,
    });
    state.history     = state.history.slice(0, 30);
    state.status      = 'working';
    state.counterStart = today;
    state.brokenSince  = null;
    await saveState();
    render();
  }

  function renderSettingsFields(isWorking) {
    el.settingsFields.innerHTML = '';
    const label = document.createElement('label');
    const input = document.createElement('input');
    input.type  = 'date';
    input.id    = 'dateInput';
    input.max   = todayISO();
    label.textContent = isWorking ? 'Data startu obecnej serii' : 'Data zgłoszenia awarii';
    input.value       = isWorking ? state.counterStart : state.brokenSince;
    el.settingsFields.appendChild(label);
    el.settingsFields.appendChild(input);
  }

  function renderHistory() {
    el.historyList.innerHTML = '';
    const hist = state.history || [];
    if (!hist.length) {
      const li = document.createElement('li');
      li.className   = 'history-empty';
      li.textContent = 'Brak zgłoszonych awarii — na razie cisza.';
      el.historyList.appendChild(li);
      return;
    }
    hist.forEach(h => {
      const li    = document.createElement('li');
      const left  = document.createElement('span');
      const right = document.createElement('span');
      left.textContent  = fmtDate(h.brokenAt) + ' → ' + fmtDate(h.fixedAt);
      right.className   = 'badge';
      right.textContent = h.repairDays + ' dni napr.';
      li.appendChild(left);
      li.appendChild(right);
      el.historyList.appendChild(li);
    });
  }

  /* ── Event listeners ─────────────────────────────────────── */
  el.settingsToggle.addEventListener('click', () =>
    el.settings.classList.toggle('open'));

  el.settingsSave.addEventListener('click', async () => {
    const input = document.getElementById('dateInput');
    if (!input?.value) return;
    if (state.status === 'working') state.counterStart = input.value;
    else                            state.brokenSince  = input.value;
    await saveState();
    el.settings.classList.remove('open');
    render();
  });

  el.historyToggle.addEventListener('click', () => {
    const v = el.historyList.style.display !== 'none';
    el.historyList.style.display       = v ? 'none' : 'flex';
    el.historyList.style.flexDirection = 'column';
  });

  /* ── Boot ───────────────────────────────────────────────── */
  loadState().then(() => {
    setInterval(poll,   20_000);   // sync with other browsers
    setInterval(render, 60_000);   // tick the day counter
  });
})();
</script>
</body>
</html>
